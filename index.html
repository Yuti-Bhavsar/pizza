<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Order Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Pizza Store</h1>
        <nav>
            <ul>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#cart">Cart</a></li>
                <li><a href="#reservations">Reservations</a></li>
                <li><a href="#contact">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="menu">
            <h2>Our Menu</h2>
            <div id="pizza-items"></div>
        </section>
        <section id="cart">
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <button id="checkout">Checkout</button>
        </section>
        <section id="reservations">
            <h2>Make a Reservation</h2>
            <form id="reservation-form">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                <label for="date">Date:</label>
                <input type="date" id="date" required>
                <label for="time">Time:</label>
                <input type="time" id="time" required>
                <button type="submit">Reserve</button>
            </form>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <p>Email: support@pizzastore.com</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pizza Store</p>
    </footer>
    <script src="script.js"></script>
    <script>
        let cart = [];

        function addToCart(item) {
            cart.push(item);
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartItemsDiv = document.getElementById('cart-items');
            cartItemsDiv.innerHTML = '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.textContent = item;
                cartItemsDiv.appendChild(div);
            });
        }

        document.getElementById('checkout').addEventListener('click', function() {
            alert('Proceeding to checkout with items: ' + cart.join(', '));
        });

        document.getElementById('reservation-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            alert(`Reservation made for ${name} on ${date} at ${time}`);
            this.reset();
        });
    </script>
</body>
</html>
